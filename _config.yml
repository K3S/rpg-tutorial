title: RPG Tutorial
description: A free, open-source tutorial for modern RPGLE and CL development on IBM i, using VS Code and contemporary tooling.
url: https://rpgtutorial.k3s.com

remote_theme: just-the-docs/just-the-docs
color_scheme: light

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

# Top-right auxiliary links
aux_links:
  "View on GitHub":
    - "https://github.com/K3S/rpg-tutorial"
  "Sponsored by K3S":
    - "https://k3s.com"
aux_links_new_tab: true

# External link in the sidebar
nav_external_links:
  - title: King III Solutions
    url: https://k3s.com
    hide_icon: false

# Code copy button
enable_copy_code_button: true

# Callouts (note, tip, warning, caution boxes)
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  caution:
    title: Caution
    color: red

# Footer
footer_content: 'Sponsored by <a href="https://k3s.com">King III Solutions</a>. Free and open source under the MIT License. <a href="https://github.com/K3S/rpg-tutorial">Contribute on GitHub</a>.'

# "Edit this page on GitHub" link at the bottom of every page
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/K3S/rpg-tutorial"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep these files out of the built site
exclude:
  - README.md
  - LICENSE
  - .github
  - vendor
  - Gemfile
  - Gemfile.lock
